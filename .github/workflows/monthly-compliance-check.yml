name: Maandelijkse compliance-check

on:
  schedule:
    # Elke 1e van de maand, 06:00 UTC. Pas aan met https://crontab.guru
    - cron: "0 6 1 * *"
  workflow_dispatch: {} # handmatig starten via de Actions-tab in GitHub

permissions:
  contents: write # om reports/ te committen
  issues: write # om een issue te openen bij bevindingen

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Sync + scan + rapport
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          # Nieuwe (Dev Dashboard) custom apps: client credentials grant.
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          # Legacy custom apps (vóór 2026-01-01): statisch token, alleen
          # nodig als SHOPIFY_CLIENT_ID/SHOPIFY_CLIENT_SECRET niet gezet zijn.
          SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node src/index.js

      - name: Commit rapport
        run: |
          git config user.name "compliance-bot"
          git config user.email "compliance-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Maandelijkse compliance-scan $(date +'%Y-%m-%d')"
          git push

      - name: Notify Droplet (herdeploy webhook)
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL niet gezet — sla webhook over."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "X-Webhook-Secret: $DEPLOY_WEBHOOK_SECRET" \
            --max-time 15 || echo "::warning::Webhook-aanroep naar Droplet mislukt (niet kritiek)."
